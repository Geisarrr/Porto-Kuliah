<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <link rel="icon" type="image/jpeg" href="Assets/R Letter.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="fade-in">

    <nav class="navbar custom-navbar py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold text-white" href="index.html">MyProfile</a>
            <div class="d-flex gap-4">
                <a class="nav-link text-white text-opacity-75" href="index.html">Profile</a>
                <a class="nav-link text-white fw-semibold" href="contact.html">Contact</a>
            </div>
        </div>
    </nav>

    <main class="container py-5 min-vh-100">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold">Contact Me</h1>
            <p class="text-secondary">Feel free to reach out for collaborations or just a friendly hello!</p>
        </div>

        <div class="row g-5 justify-content-center">
            <div class="col-lg-7">
                <div class="custom-card p-4 rounded-4 shadow-sm">
                    <form>
                        <div class="mb-4">
                            <label for="nameInput" class="form-label fw-semibold">Name</label>
                            <input type="text" class="form-control form-control-lg custom-input" id="nameInput" placeholder="Enter your name">
                        </div>
                        <div class="mb-4">
                            <label for="emailInput" class="form-label fw-semibold">Email</label>
                            <input type="email" class="form-control form-control-lg custom-input" id="emailInput" placeholder="name@example.com">
                        </div>
                        <div class="mb-4">
                            <label for="messageInput" class="form-label fw-semibold">Message</label>
                            <textarea class="form-control form-control-lg custom-input" id="messageInput" rows="5" placeholder="Write your message here..."></textarea>
                        </div>
                        <button type="button" class="btn btn-primary btn-lg w-100 fw-bold custom-btn">Submit Message</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card custom-card h-100 border-0 shadow-sm rounded-4">
                    <div class="card-body p-4 d-flex flex-column justify-content-center">
                        <h4 class="fw-bold mb-4">Contact Information</h4>
                        
                        <div class="d-flex align-items-center mb-4">
                            <div class="icon-box bg-primary bg-opacity-10 text-primary rounded-circle p-3 me-3">
                                <i class="bi bi-envelope-fill fs-4"></i>
                            </div>
                            <div>
                                <h6 class="mb-1 fw-bold text-secondary">Email</h6>
                                <p class="mb-0">rampangeisar@gmail.com</p>
                            </div>
                        </div>

                        <div class="d-flex align-items-center">
                            <div class="icon-box bg-primary bg-opacity-10 text-primary rounded-circle p-3 me-3">
                                <i class="bi bi-geo-alt-fill fs-4"></i>
                            </div>
                            <div>
                                <h6 class="mb-1 fw-bold text-secondary">Location</h6>
                                <p class="mb-0">Malang, Indonesia</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-4 border-top border-secondary border-opacity-25 mt-auto">
        <p class="mb-0 text-secondary">&copy; 2026. Built with Bootstrap & Custom CSS.</p>
    </footer>

</body>
</html>
